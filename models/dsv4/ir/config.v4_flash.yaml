# V4-flash shape — Phase 0 是 placeholder, 暂沿用 V4-Pro
# TODO: 从 PDF p.4-5 抠精确数字
name: v4_flash

num_layers: 60
csa_layers:   "..."
hca_layers:   "..."
nextn_layers: "[60]"

hidden:
  D:  4096
  Dh: 128
  Nh: 64
  Nkv: 1
  D_compressed_attn: 512
  Dq_lora: 1024

mhc:
  num_pre_groups:  128
  num_post_groups: 128

compressor:
  csa_ratio: 4
  hca_ratio: 128
  c_off: 64

indexer:
  topk: 1024

moe:
  n_routed: 128
  n_active: 4
  n_shared: 1
  expert_intermediate: 1024

sparse_mla:
  topk_chunk: 512
  kv_cache_dtype: fp8
  q_dtype: fp8

precisions:
  default: bf16
  gemm: fp4
  attn_kv_cache: fp8

bench_setup:
  prefill_input_len: 8192
  decode_iter_tokens: 1
