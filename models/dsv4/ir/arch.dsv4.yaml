      - {id: hca_compressor_block, label: "Compressor (c=128)", shape: block,
         drill: compressor_hca, accent: hca, stage_keys: [compressor_kv_score_proj],
         code_links: ["models/deepseek_v4.py:521-534 Compressor decl (is_in_indexer=False)", "models/deepseek_v4.py:807-813 forward_core_compressor call", "layers/attention/compressed/compressor.py:101-140 forward_core_compressor impl"]}
      - {id: hca_compressed_cache, label: "Compressed kv-cache", shape: cache,
         code_links: ["models/deepseek_v4.py:224-234 Compressor._get_state_pool", "layers/attention/compressed/compressor.py:127-140 set_extra_key_buffer write"]}
      - {id: hca_attn,      label: "sparse-MLA (FMHA)",      shape: attn, stage_keys: [sparse_mla_attn],
         code_links: ["models/deepseek_v4.py:862-871 attn_backend.forward call"]}
      - {id: hca_combine,   label: "MLA combine",            shape: elem, stage_keys: [sparse_mla_attn]}
      - {id: hca_inv_rope,  label: "fused_rope (inverse)",   shape: elem, stage_keys: [attn_qkv_proj_rope],
         code_links: ["models/deepseek_v4.py:873-879 fused_rope(o, ..., inverse=True)"]}
      - {id: hca_o_view,    label: "view",                   shape: elem,
         code_links: ["models/deepseek_v4.py:881 o.view(o.shape[0], n_local_groups, -1)"]}
      - {id: hca_wo_a,      label: "wo_a",                   shape: gemm, stage_keys: [attn_output_proj],
         code_links: ["models/deepseek_v4.py:582-596 wo_a decl", "models/deepseek_v4.py:883-903 wo_a fp8/bf16 einsum"]}
      - {id: hca_wo_b,      label: "wo_b",                   shape: gemm, stage_keys: [attn_output_proj],
         code_links: ["models/deepseek_v4.py:597-606 wo_b decl", "models/deepseek_v4.py:905 wo_b(o.flatten(1)) call"]}
      - {id: hca_mqa_out,   label: "out [B,S,D]",            shape: io}
    edges:
      - {from: hca_mqa_in,    to: hca_qkv_a_fuse, kind: dashed}
      - {from: hca_mqa_in,    to: hca_wq_a}
      - {from: hca_mqa_in,    to: hca_wkv}
      - {from: hca_mqa_in,    to: hca_compressor_block, label: "x"}
      - {from: hca_qkv_a_fuse, to: hca_q_norm,  kind: dashed, label: "q part"}
      - {from: hca_qkv_a_fuse, to: hca_kv_norm, kind: dashed, label: "kv part"}
      - {from: hca_wq_a,      to: hca_q_norm,    shape: "[B,S,1536]", dtype: bf16}
      - {from: hca_q_norm,    to: hca_wq_b,      shape: "[B,S,1536]", dtype: bf16}
      - {from: hca_wq_b,      to: hca_q_view,    shape: "[B,S,Nh·Dh]",dtype: bf16}
      - {from: hca_q_view,    to: hca_q_rmsnorm}
