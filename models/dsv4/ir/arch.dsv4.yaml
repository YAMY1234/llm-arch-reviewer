# DeepSeek-V4 architecture IR — view-based, 与 sglang/srt/models/deepseek_v4.py 对齐.
#
# 来源代码 (sglang-dsv4 worktree):
#   models/deepseek_v4.py:
#     169  class Compressor                       (forward at 285)
#     303  class C4Indexer                        (forward at 374)
#     403  class MQALayer                         (_forward_prepare 749, forward 819)
#     680  MQALayer._forward_prepare_multi_stream
#     910  class DeepseekV4DecoderLayer           (forward at 1090)
#    1175  class DeepseekV4Model                  (forward at 1248)
#    1357  class DeepseekV4ForCausalLM
#   models/deepseek_v2.py:
#     409  class DeepseekV2MoE                    (forward 622, forward_mega_moe 1107)
#   layers/attention/compressed/indexer.py:
#     309  C4IndexerBackend.forward_c4_indexer
#   layers/attention/compressed/compressor.py:
#      54  forward_compress
#   layers/mhc.py: mhc_pre / mhc_post / hc_split_sinkhorn / *_tilelang_kernel
#
# Layer 配置 (configs/config_backup_large.json, 62 layers, 即 V4-Pro):
#   compress_ratios = [128,128, 4,128, 4,128, 4, ..., 4,128, 4, 0]
#   ⇒ HCA (c=128, no idx) × 31  · CSA (c=4, +idx) × 30  · SWA (c=0) × 1 (last)

views:
  # =========================================================================
  # top — DeepseekV4Model.forward / DeepseekV4ForCausalLM
  # =========================================================================
  top:
    title: "DeepSeek-V4 — top-level forward"
    nodes:
      - {id: in_tokens, label: "input_ids [B,S]", shape: io}
      - {id: embed,     label: "embed_tokens\n(VocabParallelEmbedding)", shape: gemm,
         code_links: ["models/deepseek_v4.py:1189-1193 embed_tokens", "models/deepseek_v4.py:1276 forward (apply)"]}
      - {id: hc_repeat, label: "unsqueeze(1).repeat(1, hc_mult, 1)\n→ [B,S,hc_mult,D]", shape: elem,
         note: "hc_mult-way replication for mHC",
         code_links: ["models/deepseek_v4.py:1277 hc_mult repeat"]}
      - {id: decoder_stack, label: "for i in 0..N-1:\n  layers[i].forward(...)", shape: block,
         drill: stack,
         code_links: ["models/deepseek_v4.py:1322-1330 decoder loop"]}
      - {id: hc_head_node, label: "hc_head\n(model-level mHC merge)", shape: elem,
         code_links: ["models/deepseek_v4.py:1233-1246 hc_head method", "models/deepseek_v4.py:1347-1349 call site"]}
      - {id: final_norm, label: "RMSNorm\n(model.norm)", shape: norm,
         code_links: ["models/deepseek_v4.py:1211 self.norm decl", "models/deepseek_v4.py:1350 call site"]}
      - {id: nextn_head, label: "NextN (MTP)\n1× DecoderLayer (is_nextn=True)", shape: block,
         drill: nextn, accent: nextn,
         code_links: ["models/deepseek_v4.py:910-1172 DeepseekV4DecoderLayer (is_nextn=True path)"]}
      - {id: lm_head,   label: "LM head\n(ParallelLMHead)", shape: gemm,
         code_links: ["models/deepseek_v4.py:1373-1382 ParallelLMHead init"]}
      - {id: out_logits, label: "logits [B,S,V]", shape: io}
    edges:
      - {from: in_tokens,     to: embed,         shape: "[B,S]",          dtype: int32}
      - {from: embed,         to: hc_repeat,     shape: "[B,S,D]",        dtype: bf16}
      - {from: hc_repeat,     to: decoder_stack, shape: "[B,S,hc_mult,D]",dtype: bf16}
      - {from: decoder_stack, to: hc_head_node,  shape: "[B,S,hc_mult,D]",dtype: bf16, label: "after N layers"}
      - {from: hc_head_node,  to: final_norm,    shape: "[B,S,D]",        dtype: bf16}
      - {from: final_norm,    to: nextn_head,    shape: "[B,S,D]",        dtype: bf16, kind: dashed, label: "speculative"}
      - {from: final_norm,    to: lm_head,       shape: "[B,S,D]",        dtype: bf16}
      - {from: nextn_head,    to: lm_head,       shape: "[B,S,D]",        dtype: bf16, kind: dashed}
      - {from: lm_head,       to: out_logits,    shape: "[B,S,V]",        dtype: bf16}

  # =========================================================================
  # stack — N 个串行 layer, 每个 layer = CSA / HCA / SWA 之一
  # =========================================================================
  stack:
    title: "Decoder Stack — N sequential layers (V4-Pro: 62 = 30 CSA + 31 HCA + 1 SWA)"
    nodes:
      - {id: stack_in,    label: "x [B,S,hc_mult,D]", shape: io}
      - {id: stack_loop,  label: "for i in 0..N-1:\n  x = layers[i](x, ...)", shape: elem,
         short_doc: "Layers run sequentially. Variant per layer = config.compress_ratios[i].",
         code_links: ["models/deepseek_v4.py:1322-1330 decoder loop", "models/deepseek_v4.py:1198-1210 self.layers (make_layers)"]}
      - {id: layer_ribbon, label: "config.compress_ratios (V4-Pro, 62 layers):\n[128,128, 4,128,4,128, ..., 4,128, 4, 0]\n        ↑ ↑    └── alternating 4 ↔ 128 ──┘    ↑\n        layer 0,1 dense                       last = 0\nDistribution: HCA 31 · CSA 30 · SWA 1",
         shape: io,
         short_doc: "V4-Pro layers 0/1 are c=128 dense; layers 2..60 alternate 4/128; layer 61 is c=0 (SWA). V4-small differs (44 layers, layer 0/1 = c=0).",
         code_links: ["configs/config_backup_large.json:67 compress_ratios (V4-Pro)", "configs/config_backup_small.json:67 compress_ratios (V4-small)", "models/deepseek_v4.py:439-445 layer reads compress_ratios[layer_id]"]}
      - {id: layer_csa,   label: "CSA Layer (c=4)\n+ C4Indexer\n× 30 layers (V4-Pro)", shape: block,
         drill: csa_layer, accent: csa,
         code_links: ["models/deepseek_v4.py:910-1172 DeepseekV4DecoderLayer", "models/deepseek_v4.py:535-544 compress_ratio==4 ⇒ also build C4Indexer"]}
      - {id: layer_hca,   label: "HCA Layer (c=128)\nno indexer\n× 31 layers (V4-Pro)", shape: block,
         drill: hca_layer, accent: hca,
         code_links: ["models/deepseek_v4.py:910-1172 DeepseekV4DecoderLayer", "models/deepseek_v4.py:521-534 c=128 ⇒ Compressor only, no Indexer"]}
      - {id: layer_swa,   label: "SWA-dense Layer (c=0)\nno compressor\n× 1 layer (V4-Pro, last)", shape: block,
         drill: swa_layer, accent: swa,
         code_links: ["models/deepseek_v4.py:910-1172 DeepseekV4DecoderLayer", "models/deepseek_v4.py:521-545 c=0 ⇒ neither Compressor nor Indexer"]}
      - {id: stack_out,   label: "x' [B,S,hc_mult,D]\n(after N layers)", shape: io}
    edges:
      - {from: stack_in,     to: stack_loop,   shape: "[B,S,hc_mult,D]", dtype: bf16}
      - {from: stack_loop,   to: layer_ribbon, kind: dashed, label: "consult ratios[i]"}
      - {from: layer_ribbon, to: layer_csa,    kind: dashed, label: "c==4"}
      - {from: layer_ribbon, to: layer_hca,    kind: dashed, label: "c==128"}
      - {from: layer_ribbon, to: layer_swa,    kind: dashed, label: "c==0"}
      - {from: layer_csa,    to: stack_loop,   kind: dashed, label: "next i"}
      - {from: layer_hca,    to: stack_loop,   kind: dashed}
      - {from: layer_swa,    to: stack_loop,   kind: dashed}
      - {from: stack_loop,   to: stack_out,    shape: "[B,S,hc_mult,D]", dtype: bf16}

  # =========================================================================
  # CSA Layer 视图 (c=4, with C4Indexer)
  # 真实 forward 顺序 (DecoderLayer.forward, line 1090-1172):
  #   residual = x
  #   x, post1, comb1 = hc_pre(x, hc_attn_*)              # mHC pre #1
  #   x = input_layernorm(x)                              # RMSNorm
  #   x = self_attn(x, ...)                               # MQA
  #   x = hc_post(x, residual, post1, comb1)              # mHC post #1
  #   residual = x
  #   x, post2, comb2 = hc_pre(x, hc_ffn_*)               # mHC pre #2
  #   x = post_attention_layernorm(x)                     # RMSNorm
  #   x = mlp(x, ...)                                     # MoE
  #   x = hc_post(x, residual, post2, comb2)              # mHC post #2
  # =========================================================================
  csa_layer:
    title: "CSA Layer (compress_ratio=4) — 2× hc_pre/post bracket"
    nodes:
      - {id: csa_in,            label: "x [B,S,hc_mult,D]",  shape: io}
      - {id: csa_resid_attn,    label: "save residual", shape: elem, note: "for attn block"}
      - {id: csa_hc_pre_attn,   label: "hc_pre #1\n(hc_attn_fn / scale / base)", shape: block,
         drill: hc_pre, accent: csa, stage_keys: [hc_pre],
         code_links: ["models/deepseek_v4.py:987-1057 hc_pre method", "models/deepseek_v4.py:1102-1104 call site (attn block)"]}
      - {id: csa_in_ln,         label: "input_layernorm\n(RMSNorm)", shape: norm,
         code_links: ["models/deepseek_v4.py:955 input_layernorm decl", "models/deepseek_v4.py:1105 call site"]}
      - {id: csa_mqa_block,     label: "MQALayer (self_attn)\nCompressor c=4 + C4Indexer + sparse-MLA", shape: block,
         drill: csa_mqa, accent: csa,
         code_links: ["models/deepseek_v4.py:403-907 MQALayer class", "models/deepseek_v4.py:927-934 self_attn=MQALayer(...)", "models/deepseek_v4.py:1107-1111 self_attn(...) call"]}
      - {id: csa_hc_post_attn,  label: "hc_post #1\n(merge attn output)", shape: block,
         accent: csa, stage_keys: [hc_post],
         code_links: ["models/deepseek_v4.py:1059-1088 hc_post method", "models/deepseek_v4.py:1113 call site (attn block)"]}
      - {id: csa_resid_ffn,     label: "save residual", shape: elem, note: "for ffn block"}
      - {id: csa_hc_pre_ffn,    label: "hc_pre #2\n(hc_ffn_fn / scale / base)", shape: block,
         drill: hc_pre, accent: csa, stage_keys: [hc_pre],
         code_links: ["models/deepseek_v4.py:987-1057 hc_pre method", "models/deepseek_v4.py:1115-1117 call site (ffn block)"]}
      - {id: csa_post_ln,       label: "post_attention_layernorm\n(RMSNorm)", shape: norm,
         code_links: ["models/deepseek_v4.py:956-958 post_attention_layernorm decl", "models/deepseek_v4.py:1118 call site"]}
      - {id: csa_mlp_block,     label: "DeepseekV2MoE (mlp)", shape: moe,
         drill: csa_moe, accent: csa,
         code_links: ["models/deepseek_v2.py:409-1361 DeepseekV2MoE class", "models/deepseek_v4.py:945-953 self.mlp=DeepseekV2MoE(...)", "models/deepseek_v4.py:1151-1156 mlp(...) call"]}
      - {id: csa_hc_post_ffn,   label: "hc_post #2\n(merge ffn output)", shape: block,
         accent: csa, stage_keys: [hc_post],
         code_links: ["models/deepseek_v4.py:1059-1088 hc_post method", "models/deepseek_v4.py:1166 call site (ffn block)"]}
      - {id: csa_out,           label: "x' [B,S,hc_mult,D]", shape: io}
    edges:
      - {from: csa_in,           to: csa_resid_attn, shape: "[B,S,hc_mult,D]", dtype: bf16}
      - {from: csa_in,           to: csa_hc_pre_attn, shape: "[B,S,hc_mult,D]", dtype: bf16}
      - {from: csa_hc_pre_attn,  to: csa_in_ln,      shape: "[B,S,D]", dtype: bf16, label: "y (mixed)"}
      - {from: csa_in_ln,        to: csa_mqa_block,  shape: "[B,S,D]", dtype: bf16}
      - {from: csa_mqa_block,    to: csa_hc_post_attn, shape: "[B,S,D]", dtype: bf16}
      - {from: csa_resid_attn,   to: csa_hc_post_attn, kind: residual, label: "residual"}
      - {from: csa_hc_pre_attn,  to: csa_hc_post_attn, kind: dashed, label: "post / comb"}
      - {from: csa_hc_post_attn, to: csa_resid_ffn,  shape: "[B,S,hc_mult,D]", dtype: bf16}
      - {from: csa_hc_post_attn, to: csa_hc_pre_ffn, shape: "[B,S,hc_mult,D]", dtype: bf16}
      - {from: csa_hc_pre_ffn,   to: csa_post_ln,    shape: "[B,S,D]", dtype: bf16}
      - {from: csa_post_ln,      to: csa_mlp_block,  shape: "[B,S,D]", dtype: bf16}
      - {from: csa_mlp_block,    to: csa_hc_post_ffn, shape: "[B,S,D]", dtype: bf16}
      - {from: csa_resid_ffn,    to: csa_hc_post_ffn, kind: residual, label: "residual"}
      - {from: csa_hc_pre_ffn,   to: csa_hc_post_ffn, kind: dashed, label: "post / comb"}
      - {from: csa_hc_post_ffn,  to: csa_out,        shape: "[B,S,hc_mult,D]", dtype: bf16}

  # =========================================================================
  # HCA Layer 视图 (c=128, no indexer) — 跟 CSA 同结构, MQA 内部不带 indexer
  # =========================================================================
  hca_layer:
    title: "HCA Layer (compress_ratio=128, no indexer) — 2× hc_pre/post bracket"
    nodes:
      - {id: hca_in,            label: "x [B,S,hc_mult,D]",  shape: io}
      - {id: hca_resid_attn,    label: "save residual", shape: elem}
      - {id: hca_hc_pre_attn,   label: "hc_pre #1\n(hc_attn_*)", shape: block,
         drill: hc_pre, accent: hca, stage_keys: [hc_pre],
         code_links: ["models/deepseek_v4.py:987-1057 hc_pre method", "models/deepseek_v4.py:1102-1104 call site (attn block)"]}
      - {id: hca_in_ln,         label: "input_layernorm\n(RMSNorm)", shape: norm,
         code_links: ["models/deepseek_v4.py:955 input_layernorm decl", "models/deepseek_v4.py:1105 call site"]}
      - {id: hca_mqa_block,     label: "MQALayer (self_attn)\nCompressor c=128 + sparse-MLA\nno indexer", shape: block,
         drill: hca_mqa, accent: hca,
         code_links: ["models/deepseek_v4.py:403-907 MQALayer class", "models/deepseek_v4.py:927-934 self_attn=MQALayer(...)", "models/deepseek_v4.py:1107-1111 self_attn(...) call"]}
      - {id: hca_hc_post_attn,  label: "hc_post #1", shape: block, accent: hca, stage_keys: [hc_post],
         code_links: ["models/deepseek_v4.py:1059-1088 hc_post method", "models/deepseek_v4.py:1113 call site (attn block)"]}
      - {id: hca_resid_ffn,     label: "save residual", shape: elem}
      - {id: hca_hc_pre_ffn,    label: "hc_pre #2\n(hc_ffn_*)", shape: block,
         drill: hc_pre, accent: hca, stage_keys: [hc_pre],
         code_links: ["models/deepseek_v4.py:987-1057 hc_pre method", "models/deepseek_v4.py:1115-1117 call site (ffn block)"]}
      - {id: hca_post_ln,       label: "post_attention_layernorm\n(RMSNorm)", shape: norm,
         code_links: ["models/deepseek_v4.py:956-958 post_attention_layernorm decl", "models/deepseek_v4.py:1118 call site"]}
      - {id: hca_mlp_block,     label: "DeepseekV2MoE (mlp)", shape: moe,
         drill: hca_moe, accent: hca,
         code_links: ["models/deepseek_v2.py:409-1361 DeepseekV2MoE class", "models/deepseek_v4.py:945-953 self.mlp=DeepseekV2MoE(...)", "models/deepseek_v4.py:1151-1156 mlp(...) call"]}
      - {id: hca_hc_post_ffn,   label: "hc_post #2", shape: block, accent: hca, stage_keys: [hc_post],
         code_links: ["models/deepseek_v4.py:1059-1088 hc_post method", "models/deepseek_v4.py:1166 call site (ffn block)"]}
      - {id: hca_out,           label: "x' [B,S,hc_mult,D]", shape: io}
    edges:
      - {from: hca_in,           to: hca_resid_attn,   shape: "[B,S,hc_mult,D]", dtype: bf16}
      - {from: hca_in,           to: hca_hc_pre_attn,  shape: "[B,S,hc_mult,D]", dtype: bf16}
      - {from: hca_hc_pre_attn,  to: hca_in_ln,        shape: "[B,S,D]", dtype: bf16}
      - {from: hca_in_ln,        to: hca_mqa_block,    shape: "[B,S,D]", dtype: bf16}
      - {from: hca_mqa_block,    to: hca_hc_post_attn, shape: "[B,S,D]", dtype: bf16}
      - {from: hca_resid_attn,   to: hca_hc_post_attn, kind: residual}
      - {from: hca_hc_pre_attn,  to: hca_hc_post_attn, kind: dashed, label: "post / comb"}
      - {from: hca_hc_post_attn, to: hca_resid_ffn,    shape: "[B,S,hc_mult,D]", dtype: bf16}
      - {from: hca_hc_post_attn, to: hca_hc_pre_ffn,   shape: "[B,S,hc_mult,D]", dtype: bf16}
      - {from: hca_hc_pre_ffn,   to: hca_post_ln,      shape: "[B,S,D]", dtype: bf16}
      - {from: hca_post_ln,      to: hca_mlp_block,    shape: "[B,S,D]", dtype: bf16}
      - {from: hca_mlp_block,    to: hca_hc_post_ffn,  shape: "[B,S,D]", dtype: bf16}
      - {from: hca_resid_ffn,    to: hca_hc_post_ffn,  kind: residual}
      - {from: hca_hc_pre_ffn,   to: hca_hc_post_ffn,  kind: dashed, label: "post / comb"}
      - {from: hca_hc_post_ffn,  to: hca_out,          shape: "[B,S,hc_mult,D]", dtype: bf16}

  # =========================================================================
  # CSA MQALayer 视图 — 严格按 _forward_prepare (line 749) + forward (819) 重画
  # 默认路径; multi-stream 下 q_a / kv / compressor / indexer 4 路并发.
  # =========================================================================
  csa_mqa:
    title: "CSA MQALayer (c=4) — _forward_prepare + sparse-MLA + Wo"
    nodes:
      - {id: csa_mqa_in, label: "x [B,S,D]", shape: io,
         note: "input is [B,S,D] (mHC pre already merged)"}
      # ---- 输入 GEMM 分支 (fuse_wqa_wkv 为可选 fast path) ----
      - {id: csa_qkv_a_fuse, label: "wqkv_a (optional fuse)\n[D → q_lora + head_dim]", shape: gemm,
         note: "if SGLANG_OPT_FUSE_WQA_WKV",
         stage_keys: [attn_qkv_proj_rope],
         code_links: ["models/deepseek_v4.py:548-555 wqkv_a decl (fused fast path)", "models/deepseek_v4.py:758-762 _forward_prepare fused branch"]}
      - {id: csa_wq_a, label: "wq_a (Q down)\n[D → q_lora_rank=1536]", shape: gemm,
         stage_keys: [attn_qkv_proj_rope],
         code_links: ["models/deepseek_v4.py:557-563 wq_a decl", "models/deepseek_v4.py:763-765 _forward_prepare non-fused branch"]}
      - {id: csa_wkv,  label: "wkv (KV down)\n[D → 512+64]", shape: gemm,
         stage_keys: [attn_qkv_proj_rope],
         code_links: ["models/deepseek_v4.py:564-570 wkv decl", "models/deepseek_v4.py:763-765 _forward_prepare non-fused branch"]}
      # ---- Q 路径 ----
      - {id: csa_q_norm,       label: "q_norm\n(RMSNorm on q_lora)", shape: norm,
         stage_keys: [attn_qkv_proj_rope],
         code_links: ["models/deepseek_v4.py:571 q_norm decl", "models/deepseek_v4.py:766-767 q_norm(q) call"]}
      - {id: csa_q_lora_split, label: "q_lora\n(branch to indexer)", shape: io}
      - {id: csa_wq_b,         label: "wq_b (Q up)\n[1536 → Nh·Dh]", shape: gemm,
         stage_keys: [attn_qkv_proj_rope],
         code_links: ["models/deepseek_v4.py:572-580 wq_b decl", "models/deepseek_v4.py:768 wq_b(q) call"]}
      - {id: csa_q_view,       label: "view\n[B,S,Nh,Dh]", shape: elem,
         code_links: ["models/deepseek_v4.py:769 view(-1, n_local_heads, head_dim)"]}
      - {id: csa_q_rmsnorm,    label: "rmsnorm_self (per-head)\n(jit kernel)", shape: norm,
         stage_keys: [attn_qkv_proj_rope],
         code_links: ["models/deepseek_v4.py:770-773 rmsnorm_self / rms_normalize_triton"]}
      # ---- KV 路径 ----
      - {id: csa_kv_norm,      label: "kv_norm\n(RMSNorm on kv)", shape: norm,
         stage_keys: [attn_qkv_proj_rope],
         code_links: ["models/deepseek_v4.py:581 kv_norm decl", "models/deepseek_v4.py:775 kv_norm(kv) call"]}
      # ---- Fused RoPE (单 kernel 同时 q+k) ----
      - {id: csa_fused_rope,   label: "fused_rope\n(q_rope + k_rope, single kernel)", shape: elem,
         stage_keys: [attn_qkv_proj_rope],
         code_links: ["models/deepseek_v4.py:777-782 fused_rope(q,kv)"]}
      # ---- KV cache write ----
      - {id: csa_store_cache,  label: "store_cache\n(fused_store_flashmla_cache)", shape: elem,
         note: "if overlap_store_cache: in prepare; else inside attn_backend.forward",
         stage_keys: [attn_qkv_proj_rope],
         code_links: ["models/deepseek_v4.py:798-803 attn_backend.store_cache"]}
      - {id: csa_kv_cache,     label: "MLA KV cache (fp8)", shape: cache,
         code_links: ["models/deepseek_v4.py:608-616 RadixAttention(attn_mqa)", "models/deepseek_v4.py:798-803 store_cache write site"]}
      # ---- Compressor + Indexer 并行路径 ----
      - {id: csa_compressor_block, label: "Compressor (main, c=4)\nbackend.forward_core_compressor", shape: block,
         drill: compressor_csa, accent: csa, stage_keys: [compressor_kv_score_proj],
         code_links: ["models/deepseek_v4.py:521-534 Compressor decl (is_in_indexer=False)", "models/deepseek_v4.py:807-813 forward_core_compressor call", "layers/attention/compressed/compressor.py:101-140 forward_core_compressor impl"]}
      - {id: csa_compressed_cache, label: "Compressed kv-cache\n(attention pool)", shape: cache,
         code_links: ["models/deepseek_v4.py:224-234 Compressor._get_state_pool", "layers/attention/compressed/compressor.py:127-140 set_extra_key_buffer write"]}
      - {id: csa_indexer_block, label: "C4Indexer\nbackend.forward_c4_indexer\n(input: x + q_lora)", shape: block,
         drill: indexer, accent: csa, stage_keys: [indexer],
         code_links: ["models/deepseek_v4.py:303-392 C4Indexer class", "models/deepseek_v4.py:535-544 indexer decl (c=4 only)", "models/deepseek_v4.py:805-806 indexer(x, q_lora, ...) call", "layers/attention/compressed/indexer.py:309-471 forward_c4_indexer backend"]}
      - {id: csa_topk_indices, label: "c4_sparse_page_indices\n(top-K)", shape: io,
         code_links: ["layers/attention/compressed/indexer.py:423-449 topk_transform_512_*"]}
      # ---- sparse-MLA + 后处理 ----
      - {id: csa_attn,        label: "attn_backend.forward (sparse-MLA)\nflash_fwd_splitkv_mla_fp8_sparse", shape: attn,
         stage_keys: [sparse_mla_attn],
         code_links: ["models/deepseek_v4.py:862-871 attn_backend.forward call"]}
      - {id: csa_combine,     label: "MLA combine\nflash_fwd_mla_combine", shape: elem,
         stage_keys: [sparse_mla_attn]}
      - {id: csa_inv_rope,    label: "fused_rope (inverse=True)\n(undo on output)", shape: elem,
         stage_keys: [attn_qkv_proj_rope],
         code_links: ["models/deepseek_v4.py:873-879 fused_rope(o, ..., inverse=True)"]}
      - {id: csa_o_view,      label: "view\n[B,S, n_local_groups, -1]", shape: elem,
         code_links: ["models/deepseek_v4.py:881 o.view(o.shape[0], n_local_groups, -1)"]}
      - {id: csa_wo_a,        label: "wo_a (O down lora)\nfp8_einsum or einsum tgd,grd→tgr", shape: gemm,
         stage_keys: [attn_output_proj],
         code_links: ["models/deepseek_v4.py:582-596 wo_a decl", "models/deepseek_v4.py:883-903 wo_a fp8/bf16 einsum"]}
      - {id: csa_wo_b,        label: "wo_b (O up)\n[lora → D]", shape: gemm,
         stage_keys: [attn_output_proj],
         code_links: ["models/deepseek_v4.py:597-606 wo_b decl", "models/deepseek_v4.py:905 wo_b(o.flatten(1)) call"]}
      - {id: csa_mqa_out,     label: "out [B,S,D]", shape: io}
    edges:
      # 输入 fan-out
      - {from: csa_mqa_in, to: csa_qkv_a_fuse, kind: dashed, label: "if fuse"}
      - {from: csa_mqa_in, to: csa_wq_a}
      - {from: csa_mqa_in, to: csa_wkv}
      - {from: csa_mqa_in, to: csa_compressor_block, label: "x"}
      - {from: csa_mqa_in, to: csa_indexer_block, label: "x"}
      # fuse 路径 (虚线表示 alt path)
      - {from: csa_qkv_a_fuse, to: csa_q_norm,  kind: dashed, label: "q part"}
      - {from: csa_qkv_a_fuse, to: csa_kv_norm, kind: dashed, label: "kv part"}
      # Q 路径
      - {from: csa_wq_a,        to: csa_q_norm,        shape: "[B,S,1536]", dtype: bf16}
      - {from: csa_q_norm,      to: csa_q_lora_split,  shape: "[B,S,1536]", dtype: bf16}
      - {from: csa_q_lora_split,to: csa_wq_b,          shape: "[B,S,1536]", dtype: bf16}
      - {from: csa_q_lora_split,to: csa_indexer_block, shape: "q_lora",    dtype: bf16, label: "q_lora"}
      - {from: csa_wq_b,        to: csa_q_view,        shape: "[B,S,Nh·Dh]", dtype: bf16}
      - {from: csa_q_view,      to: csa_q_rmsnorm,     shape: "[B,S,Nh,Dh]", dtype: bf16}
      - {from: csa_q_rmsnorm,   to: csa_fused_rope,    shape: "[B,S,Nh,Dh]", dtype: bf16, label: "q"}
      # KV 路径
      - {from: csa_wkv,         to: csa_kv_norm,       shape: "[B,S,576]",  dtype: bf16}
      - {from: csa_kv_norm,     to: csa_fused_rope,    shape: "[B,S,576]",  dtype: bf16, label: "kv"}
      # RoPE 之后
      - {from: csa_fused_rope,  to: csa_store_cache,   shape: "[B,S,576]",  dtype: fp8, label: "kv"}
      - {from: csa_fused_rope,  to: csa_attn,          shape: "[B,S,Nh,Dh]",dtype: fp8, label: "q"}
      - {from: csa_store_cache, to: csa_kv_cache,      kind: cache_write}
      - {from: csa_kv_cache,    to: csa_attn,          kind: cache_read,    label: "k,v"}
      # Compressor/Indexer → cache
      - {from: csa_compressor_block, to: csa_compressed_cache, kind: cache_write}
      - {from: csa_compressed_cache, to: csa_attn,             kind: cache_read}
      - {from: csa_indexer_block,    to: csa_topk_indices,     dtype: int32}
      - {from: csa_topk_indices,     to: csa_attn,             dtype: int32, label: "topK"}
      # 后处理
      - {from: csa_attn,    to: csa_combine,   dtype: bf16}
      - {from: csa_combine, to: csa_inv_rope,  shape: "[B,S,Nh,Dh]", dtype: bf16}
      - {from: csa_inv_rope,to: csa_o_view}
      - {from: csa_o_view,  to: csa_wo_a,      shape: "[B,S,Ng,Dh·Nh/Ng]", dtype: bf16}
      - {from: csa_wo_a,    to: csa_wo_b,      shape: "[B,S,Ng,o_lora]",   dtype: bf16}
      - {from: csa_wo_b,    to: csa_mqa_out,   shape: "[B,S,D]",           dtype: bf16}

  # =========================================================================
