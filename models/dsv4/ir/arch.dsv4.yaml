      - {id: hca_q_norm,    label: "q_norm (RMSNorm)",       shape: norm, stage_keys: [attn_qkv_proj_rope],
         code_links: ["models/deepseek_v4.py:571 q_norm decl", "models/deepseek_v4.py:766-767 q_norm(q) call"]}
      - {id: hca_wq_b,      label: "wq_b (Q up)",            shape: gemm, stage_keys: [attn_qkv_proj_rope],
