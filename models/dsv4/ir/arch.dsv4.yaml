      - {id: hca_q_rmsnorm, label: "rmsnorm_self (per-head)",shape: norm, stage_keys: [attn_qkv_proj_rope],
         code_links: ["models/deepseek_v4.py:770-773 rmsnorm_self / rms_normalize_triton"]}
      - {id: hca_kv_norm,   label: "kv_norm (RMSNorm)",      shape: norm, stage_keys: [attn_qkv_proj_rope],
         code_links: ["models/deepseek_v4.py:581 kv_norm decl", "models/deepseek_v4.py:775 kv_norm(kv) call"]}
      - {id: hca_fused_rope,label: "fused_rope (q+k)",       shape: elem, stage_keys: [attn_qkv_proj_rope],
         code_links: ["models/deepseek_v4.py:777-782 fused_rope(q,kv)"]}
      - {id: hca_store_cache, label: "store_cache",           shape: elem, stage_keys: [attn_qkv_proj_rope],
         code_links: ["models/deepseek_v4.py:798-803 attn_backend.store_cache"]}
      - {id: hca_kv_cache,  label: "MLA KV cache (fp8)",     shape: cache,
