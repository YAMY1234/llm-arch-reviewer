  # =========================================================================
  # Compressor 视图 (c=4)
  # 真实流程 (Compressor.forward, line 285):
  #   kv_score = linear_bf16_fp32(x, wkv_gate.weight)   # 1 GEMM, JIT kernel
  #   compress_fused(kv_score, ...) → backend.forward_compress(
  #     kv_score_buffer (ring buf), ape, norm, freqs_cis, rotate, compress_ratio, ...
  #   )
  # backend.forward_compress 内部做: ring buffer 写, ratio-gated softmax+reduce_sum,
  # fused_norm_rope, fused_store_flashmla_cache.
  # =========================================================================
  compressor_csa:
    title: "Compressor (c=4) — wkv_gate + ring buffer + ratio-gated"
    nodes:
      - {id: comp_in,        label: "x [B,S,D]", shape: io}
      - {id: comp_wkv_gate,  label: "wkv_gate (ReplicatedLinear)\n[D → 2·coff·head_dim]\nlinear_bf16_fp32 (jit)", shape: gemm,
         note: "every step",
         stage_keys: [compressor_kv_score_proj],
         code_links: ["models/deepseek_v4.py:199-206 wkv_gate decl", "models/deepseek_v4.py:285-300 Compressor.forward (linear_bf16_fp32 call)"]}
      - {id: comp_kv_score,  label: "kv_score [B,S, 2·coff·head_dim]\n(coff=2 for c=4)", shape: io}
      - {id: comp_ape,       label: "ape (parameter)\n[ratio, coff·head_dim]", shape: io,
         code_links: ["models/deepseek_v4.py:195-197 ape decl", "models/deepseek_v4.py:213-222 apply_ape_hotfix"]}
      - {id: comp_ring,      label: "ring buffer (kv_score_buffer)\nattention compress_states pool", shape: cache,
         code_links: ["models/deepseek_v4.py:224-234 _get_state_pool (attention pool)", "models/deepseek_v4.py:262-283 compress_fused (ring access)"]}
      - {id: comp_ring_write,label: "backend.forward_compress\n(ring write + gating logic)", shape: elem,
         note: "every step",
         code_links: ["layers/attention/compressed/compressor.py:54-99 forward_compress (full path)", "layers/attention/compressed/compressor.py:82-91 compress_forward kernel call"]}
      - {id: comp_softmax,   label: "softmax + reduce_sum\n(ratio-gated)", shape: elem, note: "every c=4 steps",
         code_links: ["layers/attention/compressed/compressor.py:82-91 compress_forward (softmax/reduce inside)"]}
      - {id: comp_norm,      label: "DeepseekRefRMSNorm",  shape: norm, note: "every c=4 steps",
         code_links: ["models/deepseek_v4.py:99-111 DeepseekRefRMSNorm class", "models/deepseek_v4.py:207 self.norm decl"]}
      - {id: comp_rope,      label: "fused_norm_rope\n(rotate optional)", shape: elem, note: "every c=4 steps",
         code_links: ["layers/attention/compressed/compressor.py:92-98 compress_fused_norm_rope_inplace", "layers/attention/compressed/compressor.py:99 rotate_activation (rotate=True for indexer)"]}
      - {id: comp_store,     label: "fused_store_flashmla_cache", shape: elem, note: "every c=4 steps",
         code_links: ["layers/attention/compressed/compressor.py:101-140 forward_core_compressor", "layers/attention/compressed/compressor.py:127-140 set_extra_key_buffer(_fused) write"]}
      - {id: comp_out_cache, label: "Compressed kv-cache\n(attention pool)", shape: cache,
         code_links: ["models/deepseek_v4.py:224-234 _get_state_pool (is_in_indexer=False)"]}
    edges:
      - {from: comp_in,        to: comp_wkv_gate, shape: "[B,S,D]", dtype: bf16}
      - {from: comp_wkv_gate,  to: comp_kv_score, shape: "[B,S, 2·coff·Dh]", dtype: fp32}
      - {from: comp_kv_score,  to: comp_ring_write}
      - {from: comp_ring_write,to: comp_ring,     kind: cache_write, label: "every step"}
      - {from: comp_ape,       to: comp_ring_write, kind: dashed,  label: "ape add"}
      - {from: comp_ring,      to: comp_softmax,  kind: cache_read, label: "if i % c == 0"}
      - {from: comp_softmax,   to: comp_norm,     kind: dashed, dtype: fp32}
      - {from: comp_norm,      to: comp_rope,     kind: dashed}
      - {from: comp_rope,      to: comp_store,    kind: dashed}
      - {from: comp_store,     to: comp_out_cache,kind: cache_write}

  compressor_hca:
    title: "Compressor (c=128) — wkv_gate + ring buffer + ratio-gated (no overlap)"
    nodes:
      - {id: comph_in,        label: "x [B,S,D]", shape: io}
      - {id: comph_wkv_gate,  label: "wkv_gate (ReplicatedLinear)\n[D → 2·coff·head_dim]\n(coff=1 for c=128)", shape: gemm,
         note: "every step", stage_keys: [compressor_kv_score_proj],
         code_links: ["models/deepseek_v4.py:199-206 wkv_gate decl", "models/deepseek_v4.py:285-300 Compressor.forward (linear_bf16_fp32 call)"]}
      - {id: comph_kv_score,  label: "kv_score [B,S, 2·head_dim]", shape: io}
      - {id: comph_ape,       label: "ape (parameter)", shape: io,
         code_links: ["models/deepseek_v4.py:195-197 ape decl"]}
      - {id: comph_ring,      label: "ring buffer", shape: cache,
         code_links: ["models/deepseek_v4.py:224-234 _get_state_pool (attention pool)", "models/deepseek_v4.py:262-283 compress_fused (ring access)"]}
      - {id: comph_ring_write,label: "backend.forward_compress",  shape: elem, note: "every step",
         code_links: ["layers/attention/compressed/compressor.py:54-99 forward_compress (full path)", "layers/attention/compressed/compressor.py:82-91 compress_forward kernel call"]}
      - {id: comph_softmax,   label: "softmax + reduce_sum",       shape: elem, note: "every c=128 steps",
         code_links: ["layers/attention/compressed/compressor.py:82-91 compress_forward (softmax/reduce inside)"]}
      - {id: comph_norm,      label: "DeepseekRefRMSNorm",         shape: norm, note: "every c=128 steps",
         code_links: ["models/deepseek_v4.py:99-111 DeepseekRefRMSNorm class", "models/deepseek_v4.py:207 self.norm decl"]}
      - {id: comph_rope,      label: "fused_norm_rope",            shape: elem, note: "every c=128 steps",
         code_links: ["layers/attention/compressed/compressor.py:92-98 compress_fused_norm_rope_inplace"]}
      - {id: comph_store,     label: "fused_store_flashmla_cache", shape: elem, note: "every c=128 steps",
         code_links: ["layers/attention/compressed/compressor.py:101-140 forward_core_compressor", "layers/attention/compressed/compressor.py:127-140 set_extra_key_buffer(_fused) write"]}
      - {id: comph_out_cache, label: "Compressed kv-cache",        shape: cache,
         code_links: ["models/deepseek_v4.py:224-234 _get_state_pool (is_in_indexer=False)"]}
    edges:
      - {from: comph_in,        to: comph_wkv_gate, dtype: bf16}
      - {from: comph_wkv_gate,  to: comph_kv_score, dtype: fp32}
      - {from: comph_kv_score,  to: comph_ring_write}
      - {from: comph_ring_write,to: comph_ring, kind: cache_write, label: "every step"}
      - {from: comph_ape,       to: comph_ring_write, kind: dashed, label: "ape add"}
      - {from: comph_ring,      to: comph_softmax, kind: cache_read, label: "if i % 128 == 0"}
      - {from: comph_softmax,   to: comph_norm,    kind: dashed}
      - {from: comph_norm,      to: comph_rope,    kind: dashed}
      - {from: comph_rope,      to: comph_store,   kind: dashed}
      - {from: comph_store,     to: comph_out_cache, kind: cache_write}

  # =========================================================================
  # C4Indexer 视图 (CSA only, line 374 forward → backend.forward_c4_indexer)
  # 三路并发 (multi-stream): compressor / q / weights
  # =========================================================================
  indexer:
    title: "C4 Indexer (CSA only) — 3 streams + fp8_paged_mqa_logits + topK"
    nodes:
      - {id: idx_in_x,        label: "x [B,S,D]",                 shape: io}
      - {id: idx_in_qlora,    label: "q_lora [B,S,1536]\n(from MQA)", shape: io}
      # ---- 路径 A: 内嵌 Compressor 写 index_k cache ----
      - {id: idx_compressor,  label: "Compressor\n(c=4, is_in_indexer=True, rotate=True)", shape: block,
         drill: compressor_csa, accent: csa, stage_keys: [compressor_kv_score_proj],
         code_links: ["models/deepseek_v4.py:340-350 self.compressor decl (in C4Indexer.__init__)", "layers/attention/compressed/compressor.py:142-179 forward_indexer_compressor", "layers/attention/compressed/indexer.py:255-260 multi-stream call site", "layers/attention/compressed/indexer.py:298-303 normal call site"]}
      - {id: idx_index_k,     label: "index_k cache\n(get_index_k_with_scale_buffer)", shape: cache,
         code_links: ["layers/attention/compressed/indexer.py:261-263 multi-stream read", "layers/attention/compressed/indexer.py:304-306 normal read", "layers/attention/compressed/compressor.py:163-178 set_index_k_*"]}
      # ---- 路径 B: q ----
      - {id: idx_wq_b,        label: "wq_b\n[1536 → n_heads·head_dim]", shape: gemm, stage_keys: [indexer],
         code_links: ["models/deepseek_v4.py:324-331 wq_b decl", "models/deepseek_v4.py:356-366 compute_q (wq_b → rope → rotate)", "models/deepseek_v4.py:357 wq_b call"]}
      - {id: idx_view,        label: "view [B,S,Nh_idx,Dh_idx]", shape: elem,
         code_links: ["models/deepseek_v4.py:358 view(-1, n_local_heads, head_dim)"]}
      - {id: idx_fused_rope,  label: "fused_rope (q rope only)", shape: elem, stage_keys: [indexer],
         code_links: ["models/deepseek_v4.py:359-364 fused_rope call"]}
      - {id: idx_rotate,      label: "rotate_activation\n(Hadamard)", shape: elem, stage_keys: [indexer],
         code_links: ["models/deepseek_v4.py:365 rotate_activation call"]}
      - {id: idx_act_quant,   label: "act_quant (bf16 → fp8)\nq_fp8 + q_scale", shape: elem, stage_keys: [indexer],
         code_links: ["layers/attention/compressed/indexer.py:269 act_quant (multi-stream)", "layers/attention/compressed/indexer.py:295 act_quant (normal)"]}
      # ---- 路径 C: weights ----
      - {id: idx_weights_proj,label: "weights_proj\n[D → n_heads]", shape: gemm, stage_keys: [indexer],
         code_links: ["models/deepseek_v4.py:332-339 weights_proj decl", "models/deepseek_v4.py:368-372 compute_weights"]}
      - {id: idx_fused_scale, label: "fused_scale\n(× weight_scale × q_scale)", shape: elem, stage_keys: [indexer],
         code_links: ["layers/attention/compressed/indexer.py:203-223 fused_scale impl", "layers/attention/compressed/indexer.py:275 fused_scale (multi-stream)", "layers/attention/compressed/indexer.py:297 fused_scale (normal)"]}
      # ---- 主算子 + topK ----
      - {id: idx_logits,      label: "fp8_paged_mqa_logits\n(deep_gemm or tilelang)", shape: attn, stage_keys: [indexer],
         code_links: ["layers/attention/compressed/indexer.py:375-401 fp8_paged_mqa_logits dispatch + call"]}
      - {id: idx_topk,        label: "topk_transform_512_v2\n(or v1 / torch)", shape: elem, stage_keys: [indexer],
         code_links: ["layers/attention/compressed/indexer.py:423-449 topk_transform_512 dispatch (torch / v2 / v1)"]}
      - {id: idx_out,         label: "c4_sparse_page_indices\n(top-K, int32)", shape: io}
    edges:
      # x 路径
      - {from: idx_in_x,        to: idx_compressor}
      - {from: idx_compressor,  to: idx_index_k,    kind: cache_write}
      - {from: idx_in_x,        to: idx_weights_proj}
      # q 路径
      - {from: idx_in_qlora,    to: idx_wq_b,       shape: "[B,S,1536]", dtype: bf16}
      - {from: idx_wq_b,        to: idx_view,       shape: "[B,S,Nh·Dh]", dtype: bf16}
      - {from: idx_view,        to: idx_fused_rope}
      - {from: idx_fused_rope,  to: idx_rotate}
      - {from: idx_rotate,      to: idx_act_quant,  dtype: bf16}
      # weights 路径 (需 q_scale)
      - {from: idx_weights_proj,to: idx_fused_scale, shape: "[B,S,Nh]", dtype: bf16}
      - {from: idx_act_quant,   to: idx_fused_scale, kind: dashed, label: "q_scale"}
      # 主算子
      - {from: idx_act_quant,   to: idx_logits,     shape: "q_fp8", dtype: fp8}
      - {from: idx_index_k,     to: idx_logits,     kind: cache_read}
      - {from: idx_fused_scale, to: idx_logits,     label: "weights"}
      - {from: idx_logits,      to: idx_topk,       dtype: fp32}
      - {from: idx_topk,        to: idx_out,        dtype: int32}

  # =========================================================================
  # MoE (DeepseekV2MoE.forward / forward_mega_moe)
  # =========================================================================
  csa_moe:
    title: "DSMoE (forward_mega_moe) — shared ⊕ routed mega-MoE"
    nodes:
      - {id: moe_in,         label: "x [B,S,D]",       shape: io}
      - {id: moe_shared,     label: "Shared experts\n(_forward_shared_experts: FC1+SiLU+FC2)", shape: gemm,
         stage_keys: [moe_shared],
         code_links: ["models/deepseek_v2.py:1266-1274 _forward_shared_experts", "models/deepseek_v2.py:1128-1135 call site (with optional alt_stream)"]}
      # ---- routed branch ----
      - {id: moe_gate,       label: "gate (router)\n[D → n_routed=256]", shape: gemm,
         stage_keys: [moe_topk],
         code_links: ["models/deepseek_v2.py:294-407 MoEGate class", "models/deepseek_v2.py:1166 self.gate(hidden_states, ...) call"]}
      - {id: moe_topk_op,    label: "topk\nsoftplus + sqrt + bias\n+ Top-8 + Norm", shape: elem,
         stage_keys: [moe_topk],
         code_links: ["models/deepseek_v2.py:1167-1182 self.topk(...) call (incl. is_hash branch)"]}
      - {id: moe_pre_disp,   label: "mega_moe_pre_dispatch\n(pad / quantize / pack)", shape: elem,
         note: "if SGLANG_OPT_MEGA_MOE_FUSED_PRE_DISPATCH",
         stage_keys: [moe_dispatch_combine],
         code_links: ["models/deepseek_v2.py:1201-1243 pre-dispatch block (fused vs. split paths)", "models/deepseek_v2.py:1211-1231 fused mega_moe_pre_dispatch path", "models/deepseek_v2.py:1232-1243 fallback per_token_group_quant + copy_"]}
      - {id: moe_mega,       label: "deep_gemm sm100_fp8_fp4_mega_moe\n(dispatch + grouped GEMM + combine)", shape: gemm,
         stage_keys: [moe_dispatch_combine],
         code_links: ["models/deepseek_v2.py:1149-1264 _run_mega_routed (full)", "models/deepseek_v2.py:1245-1260 deep_gemm.fp8_fp4_mega_moe call"]}
      - {id: moe_sum,        label: "y.add_(shared_output)", shape: elem,
         code_links: ["models/deepseek_v2.py:1107-1147 forward_mega_moe (overlap & sum)", "models/deepseek_v2.py:1145-1146 y.add_(shared_output)"]}
      - {id: moe_out,        label: "out [B,S,D]",     shape: io}
    edges:
      - {from: moe_in,    to: moe_shared,   shape: "[B,S,D]", dtype: bf16}
      - {from: moe_in,    to: moe_gate,     shape: "[B,S,D]", dtype: bf16}
      - {from: moe_in,    to: moe_pre_disp, shape: "[B,S,D]", dtype: bf16}
      - {from: moe_gate,  to: moe_topk_op,  shape: "[B,S,256]", dtype: fp32}
      - {from: moe_topk_op, to: moe_pre_disp, shape: "topK ids+w", dtype: int32}
      - {from: moe_pre_disp, to: moe_mega,  dtype: fp8}
      - {from: moe_mega,  to: moe_sum,      dtype: bf16}
      - {from: moe_shared,to: moe_sum,      label: "shared", kind: dashed}
      - {from: moe_sum,   to: moe_out,      shape: "[B,S,D]", dtype: bf16}

  hca_moe:
    title: "DSMoE (forward_mega_moe) — shared ⊕ routed mega-MoE"
    same_as: csa_moe

  # =========================================================================
  # mHC pre — 3 路实现分支 (DecoderLayer.hc_pre, line 987)
  # =========================================================================
  hc_pre:
    title: "mHC pre — 3 implementation paths"
    nodes:
      - {id: hcp_in,        label: "x [B,S,hc_mult,D]\nhc_fn / hc_scale / hc_base", shape: io}
      # ---- 路径 1: tilelang (default) ----
      - {id: hcp_tilelang,  label: "mhc_pre (tilelang)\nfuse: sqrsum + RMSNorm + gate proj\n+ hc_split_sinkhorn", shape: elem,
         note: "if SGLANG_OPT_USE_TILELANG_MHC_PRE  ← default in 855",
         code_links: ["layers/mhc.py:441-563 mhc_pre wrapper", "layers/mhc.py:117-244 mhc_pre_big_fuse_tilelang kernel", "layers/mhc.py:246-312 mhc_pre_gemm_sqrsum_tilelang kernel", "models/deepseek_v4.py:1013-1027 tilelang call site"]}
      # ---- 路径 2: deep_gemm tf32 (vllm 路径, sglang 已实现未启用) ----
      - {id: hcp_deepgemm,  label: "deep_gemm.tf32_hc_prenorm_gemm\n+ hc_split_sinkhorn", shape: elem,
         note: "if SGLANG_OPT_DEEPGEMM_HC_PRENORM  (vllm fast path)",
         code_links: ["models/deepseek_v4.py:1029-1042 deep_gemm tf32_hc_prenorm_gemm path"]}
      # ---- 路径 3: torch fallback ----
      - {id: hcp_torch,     label: "torch (compile) impl\n+ hc_split_sinkhorn", shape: elem,
         note: "fallback (neither flag set)",
         code_links: ["models/deepseek_v4.py:994-1001 hc_pre_torch_impl", "models/deepseek_v4.py:1043-1057 fallback path + sinkhorn merge"]}
      - {id: hcp_sinkhorn,  label: "hc_split_sinkhorn\n(common, except tilelang fuses it)", shape: elem,
         code_links: ["layers/mhc.py:93-115 hc_split_sinkhorn wrapper", "layers/mhc.py:26-91 hc_split_sinkhorn_kernel (tilelang)", "models/deepseek_v4.py:1046-1057 sinkhorn call site (deep_gemm/torch paths)"]}
      - {id: hcp_out,       label: "(y, post, comb)\ny: [B,S,D]\npost: [B,S,hc_mult]\ncomb: [B,S,hc_mult,hc_mult]", shape: io}
    edges:
      - {from: hcp_in, to: hcp_tilelang, kind: dashed, label: "path 1"}
      - {from: hcp_in, to: hcp_deepgemm, kind: dashed, label: "path 2"}
      - {from: hcp_in, to: hcp_torch,    kind: dashed, label: "path 3"}
      - {from: hcp_tilelang, to: hcp_out, label: "fused"}
      - {from: hcp_deepgemm, to: hcp_sinkhorn, dtype: fp32}
      - {from: hcp_torch,    to: hcp_sinkhorn, dtype: bf16}
      - {from: hcp_sinkhorn, to: hcp_out}

  # =========================================================================
  # SWA-dense (compress_ratio=0): same DecoderLayer 但 MQALayer 内部 compressor=None / indexer=None
  # =========================================================================
  swa_layer:
    title: "SWA-dense Layer (compress_ratio=0) — DecoderLayer minus compressor/indexer"
    nodes:
      - {id: swa_in,           label: "x [B,S,hc_mult,D]", shape: io}
      - {id: swa_hc_pre_attn,  label: "hc_pre #1", shape: block, drill: hc_pre, accent: swa, stage_keys: [hc_pre],
         code_links: ["models/deepseek_v4.py:987-1057 hc_pre method", "models/deepseek_v4.py:1102-1104 call site (attn block)"]}
      - {id: swa_in_ln,        label: "input_layernorm", shape: norm,
         code_links: ["models/deepseek_v4.py:955 input_layernorm decl", "models/deepseek_v4.py:1105 call site"]}
      - {id: swa_mqa,          label: "MQALayer (compressor=None, indexer=None)\nMLA + sliding window only", shape: block, accent: swa,
         code_links: ["models/deepseek_v4.py:521-545 c=0 ⇒ neither Compressor nor Indexer is constructed", "models/deepseek_v4.py:403-907 MQALayer class"]}
      - {id: swa_hc_post_attn, label: "hc_post #1", shape: block, accent: swa, stage_keys: [hc_post],
         code_links: ["models/deepseek_v4.py:1059-1088 hc_post method", "models/deepseek_v4.py:1113 call site (attn block)"]}
      - {id: swa_hc_pre_ffn,   label: "hc_pre #2", shape: block, drill: hc_pre, accent: swa, stage_keys: [hc_pre],
         code_links: ["models/deepseek_v4.py:987-1057 hc_pre method", "models/deepseek_v4.py:1115-1117 call site (ffn block)"]}
      - {id: swa_post_ln,      label: "post_attention_layernorm", shape: norm,
         code_links: ["models/deepseek_v4.py:956-958 post_attention_layernorm decl", "models/deepseek_v4.py:1118 call site"]}
      - {id: swa_mlp,          label: "DeepseekV2MoE", shape: moe, accent: swa, drill: csa_moe,
         code_links: ["models/deepseek_v2.py:409-1361 DeepseekV2MoE class", "models/deepseek_v4.py:945-953 self.mlp=DeepseekV2MoE(...)", "models/deepseek_v4.py:1151-1156 mlp(...) call"]}
      - {id: swa_hc_post_ffn,  label: "hc_post #2", shape: block, accent: swa, stage_keys: [hc_post],
         code_links: ["models/deepseek_v4.py:1059-1088 hc_post method", "models/deepseek_v4.py:1166 call site (ffn block)"]}
      - {id: swa_out,          label: "x' [B,S,hc_mult,D]", shape: io}
    edges:
      - {from: swa_in,           to: swa_hc_pre_attn, dtype: bf16}
      - {from: swa_hc_pre_attn,  to: swa_in_ln,       dtype: bf16}
      - {from: swa_in_ln,        to: swa_mqa,         dtype: bf16}
      - {from: swa_mqa,          to: swa_hc_post_attn,dtype: bf16}
      - {from: swa_in,           to: swa_hc_post_attn, kind: residual}
      - {from: swa_hc_post_attn, to: swa_hc_pre_ffn,  dtype: bf16}
      - {from: swa_hc_pre_ffn,   to: swa_post_ln,     dtype: bf16}
      - {from: swa_post_ln,      to: swa_mlp,         dtype: bf16}
      - {from: swa_mlp,          to: swa_hc_post_ffn, dtype: bf16}
      - {from: swa_hc_post_attn, to: swa_hc_post_ffn, kind: residual}
      - {from: swa_hc_post_ffn,  to: swa_out,         dtype: bf16}

  # =========================================================================
  # NextN (MTP) — 1× DecoderLayer with is_nextn=True (always sparse)
  # =========================================================================
  nextn:
    title: "NextN (MTP) — 1× DecoderLayer (is_nextn=True)"
    nodes:
      - {id: nextn_in,    label: "x [B,S,hc_mult,D]", shape: io}
      - {id: nextn_layer, label: "DecoderLayer\n(is_nextn=True → always MoE)", shape: block, accent: nextn, drill: csa_layer,
         note: "structure same as CSA/HCA layer; ratio per config",
         code_links: ["models/deepseek_v4.py:910-1172 DeepseekV4DecoderLayer", "models/deepseek_v4.py:917 is_nextn ctor arg", "models/deepseek_v4.py:935-944 _is_layer_sparse(layer_id, is_nextn=True) ⇒ always sparse", "models/deepseek_v4.py:974-985 _is_layer_sparse impl"]}
      - {id: nextn_out,   label: "x' [B,S,hc_mult,D]", shape: io}
    edges:
      - {from: nextn_in,    to: nextn_layer, dtype: bf16}
      - {from: nextn_layer, to: nextn_out,   dtype: bf16}
