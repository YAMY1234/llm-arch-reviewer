         code_links: ["models/deepseek_v4.py:548-555 wqkv_a decl (fused fast path)", "models/deepseek_v4.py:758-762 _forward_prepare fused branch"]}
      - {id: hca_wq_a, label: "wq_a (Q down)\n[D → 1536]", shape: gemm, stage_keys: [attn_qkv_proj_rope],
         code_links: ["models/deepseek_v4.py:557-563 wq_a decl", "models/deepseek_v4.py:763-765 _forward_prepare non-fused branch"]}
